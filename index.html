<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>좋은입력</title>
  <meta name="theme-color" content="#0b0f1a" />
  <style>
    :root {
      --bg: #0b0f1a;
      --panel: #121827;
      --panel-2: #0f1522;
      --line: #222c42;
      --text: #eef2ff;
      --muted: #9aa5c3;
      --blue: #7aa2ff;
      --green: #7ee0ae;
      --orange: #ffb86b;
      --shadow: 0 10px 30px rgba(0, 0, 0, .28);
      --radius: 18px;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    body { line-height: 1.5; }
    a { color: inherit; text-decoration: none; }
    button, input { font: inherit; }

    .app {
      width: 100%;
      max-width: 720px;
      margin: 0 auto;
      padding-bottom: 88px;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 30;
      padding: 14px 14px 10px;
      background: linear-gradient(180deg, rgba(11,15,26,.96), rgba(11,15,26,.92));
      backdrop-filter: blur(14px);
      border-bottom: 1px solid rgba(255,255,255,.04);
    }

    .brand {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .brand h1 {
      margin: 0;
      font-size: 24px;
      line-height: 1.1;
      letter-spacing: -.02em;
    }

    .brand p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .badge {
      flex: 0 0 auto;
      border: 1px solid rgba(126,224,174,.35);
      color: var(--green);
      background: rgba(126,224,174,.10);
      padding: 7px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
    }

    .search {
      width: 100%;
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--text);
      border-radius: 14px;
      padding: 14px 14px;
      font-size: 15px;
      outline: none;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.02);
    }

    .chips {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-top: 10px;
      scrollbar-width: none;
    }
    .chips::-webkit-scrollbar { display: none; }

    .subchips {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-top: 8px;
      scrollbar-width: none;
    }
    .subchips::-webkit-scrollbar { display: none; }

    .chip {
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--text);
      border-radius: 999px;
      padding: 10px 13px;
      white-space: nowrap;
      font-size: 13px;
      cursor: pointer;
    }
    .chip.active {
      background: rgba(122,162,255,.16);
      border-color: rgba(122,162,255,.45);
      color: #dfe8ff;
    }

    .subchip {
      border: 1px solid var(--line);
      background: transparent;
      color: var(--muted);
      border-radius: 999px;
      padding: 7px 11px;
      white-space: nowrap;
      font-size: 12px;
      cursor: pointer;
    }

    .subchip.active {
      background: rgba(126,224,174,.10);
      border-color: rgba(126,224,174,.35);
      color: var(--green);
    }

    .more-tools {
      margin-top: 8px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(255,255,255,.02);
      padding: 10px 12px;
    }

    .more-tools summary {
      list-style: none;
      cursor: pointer;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .more-tools summary::-webkit-details-marker {
      display: none;
    }

    .more-tools[open] summary {
      color: var(--text);
    }

    .subtools-label {
      margin: 10px 0 2px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
    }

    .compact-mode .hero-card,
    .compact-mode .helper {
      display: none;
    }

    .compact-mode .content {
      padding-top: 10px;
    }

    .compact-mode .section-label {
      margin: 8px 2px 8px;
    }

    .compact-mode .feed {
      gap: 8px;
    }

    .compact-mode .card {
      padding: 12px;
      border-radius: 14px;
    }

    .compact-mode .meta-top {
      margin-bottom: 6px;
      gap: 8px;
    }

    .compact-mode .dot {
      width: 8px;
      height: 8px;
      box-shadow: 0 0 0 3px rgba(122,162,255,.12);
    }

    .compact-mode .category {
      font-size: 11px;
      margin-bottom: 1px;
    }

    .compact-mode .title {
      font-size: 16px;
      line-height: 1.35;
    }

    .compact-mode .score {
      padding: 5px 8px;
      font-size: 11px;
    }

    .compact-mode .meta-line {
      font-size: 12px;
      margin-bottom: 4px;
    }

    .compact-mode .why {
      font-size: 13px;
      line-height: 1.45;
      margin-bottom: 0;
      display: -webkit-box;
      -webkit-line-clamp: 1;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .compact-mode .actions {
      margin-top: 8px;
    }

    .compact-mode .btn {
      min-height: 38px;
      font-size: 13px;
      border-radius: 12px;
    }

    .content {
      padding: 14px;
    }

    .hero-card, .card, .mini-card {
      background: linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.01));
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .hero-card {
      padding: 16px;
      margin-bottom: 14px;
      background:
        radial-gradient(circle at top right, rgba(122,162,255,.22), transparent 34%),
        linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.01));
    }

    .hero-title {
      font-size: 18px;
      font-weight: 800;
      margin: 0 0 8px;
    }

    .hero-text {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
    }

    .section-label {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 18px 2px 10px;
    }

    .section-label h2 {
      margin: 0;
      font-size: 15px;
    }

    .section-label span {
      color: var(--muted);
      font-size: 12px;
    }

    .feed {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .card {
      padding: 16px;
    }

    .meta-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
    }

    .source {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--blue);
      flex: 0 0 auto;
      box-shadow: 0 0 0 4px rgba(122,162,255,.12);
    }

    .category {
      font-size: 12px;
      color: var(--green);
      font-weight: 700;
      margin-bottom: 2px;
    }

    .title {
      margin: 0;
      font-size: 19px;
      line-height: 1.35;
      word-break: keep-all;
    }

    .score {
      flex: 0 0 auto;
      border: 1px solid rgba(255,184,107,.35);
      background: rgba(255,184,107,.08);
      color: var(--orange);
      border-radius: 999px;
      padding: 7px 10px;
      font-size: 12px;
      font-weight: 700;
    }

    .desc {
      color: #d8def2;
      font-size: 14px;
      margin: 0 0 8px;
    }

    .why {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.65;
      margin: 0 0 8px;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr;
      margin-top: 14px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 46px;
      padding: 0 14px;
      border-radius: 14px;
      border: 1px solid rgba(122,162,255,.45);
      background: rgba(122,162,255,.14);
      color: var(--text);
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
    }

    .meta-line {
      color: var(--muted);
      font-size: 13px;
      margin: 0 0 8px;
    }

    .helper {
      margin-top: 18px;
      padding: 14px;
      color: var(--muted);
      font-size: 13px;
      text-align: center;
    }

    .footer-nav {
      position: fixed;
      left: 50%;
      bottom: 10px;
      transform: translateX(-50%);
      width: min(92vw, 560px);
      border: 1px solid var(--line);
      background: rgba(15,21,34,.92);
      backdrop-filter: blur(12px);
      border-radius: 18px;
      padding: 8px;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      box-shadow: var(--shadow);
    }

    .routine-card {
      width: 100%;
      border: 1px solid var(--line);
      color: var(--text);
      text-align: left;
      cursor: pointer;
    }

    .routine-card:hover,
    .routine-card:focus-visible {
      border-color: rgba(122,162,255,.45);
      background: rgba(122,162,255,.08);
      outline: none;
    }

    .routine-go {
      display: inline-flex;
      margin-top: 12px;
      color: var(--blue);
      font-size: 13px;
      font-weight: 700;
    }

    .nav-btn {
      border: 0;
      background: transparent;
      color: var(--muted);
      border-radius: 12px;
      padding: 10px 8px;
      font-size: 12px;
      cursor: pointer;
    }

    .nav-btn.active {
      background: rgba(122,162,255,.14);
      color: var(--text);
    }

    .hidden { display: none !important; }

    @media (min-width: 721px) {
      .content { padding: 18px; }
      .topbar { padding: 18px 18px 12px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <div>
          <h1>좋은입력</h1>
          <p>판단에 쓰는 원문만 남긴다</p>
        </div>
        <div class="badge">화이트리스트</div>
      </div>
      <input id="search" class="search" type="text" placeholder="제목, 출처 검색" />
      <div class="chips" id="filters"></div>
      <details class="more-tools">
        <summary>언어 · 보기</summary>
        <div class="subtools-label">언어</div>
        <div class="subchips" id="language-filters"></div>
        <div class="subtools-label">보기</div>
        <div class="subchips" id="view-mode-filters"></div>
      </details>
    </header>

    <main class="content">
      <section id="home-section">
        <div class="hero-card">
          <p class="hero-title">Dilrong용 입력 피드</p>
          <p class="hero-text">원문 소스는 넓혔다. 화면은 줄였다. 중요, 최근부터 보고 바로 원문으로 들어간다.</p>
        </div>

        <div class="section-label">
          <h2>지금 볼 입력</h2>
          <span id="result-count">0개</span>
        </div>
        <div class="feed" id="feed"></div>
      </section>

      <section id="routine-section" class="hidden">
        <div class="hero-card">
          <p class="hero-title">루틴 선택</p>
          <p class="hero-text">지금 필요한 모드만 남긴다.</p>
        </div>
        <div class="feed">
          <button class="card routine-card" type="button" data-routine="decision">
            <div class="category">루틴 1</div>
            <h3 class="title">판단 모드</h3>
            <p class="desc">정책, 이슈, 연구, 개발, 경제 원문을 넓게 본다.</p>
            <p class="why">구조 변화와 의사결정 재료를 빠르게 훑는다.</p>
            <span class="routine-go">해당 피드 보기</span>
          </button>
          <button class="card routine-card" type="button" data-routine="capital">
            <div class="category">루틴 2</div>
            <h3 class="title">자본 모드</h3>
            <p class="desc">성장, 재정, 경기, 금리, 기업, 산업, 인프라 관련 항목만 본다.</p>
            <p class="why">현금흐름과 장기 자본 배치에 닿는 입력만 남긴다.</p>
            <span class="routine-go">해당 피드 보기</span>
          </button>
          <button class="card routine-card" type="button" data-routine="recovery">
            <div class="category">루틴 3</div>
            <h3 class="title">회복 모드</h3>
            <p class="desc">MMCA, 박물관, EBS 중심으로 가볍게 본다.</p>
            <p class="why">자극이 아니라 감각과 밀도를 회복한다.</p>
            <span class="routine-go">해당 피드 보기</span>
          </button>
        </div>
      </section>

      <div class="helper">필터는 적게, 원문은 많이.</div>
    </main>
  </div>

  <nav class="footer-nav">
    <button class="nav-btn active" data-target="home-section">피드</button>
    <button class="nav-btn" data-target="routine-section">루틴</button>
  </nav>

  <script>
    const feedEl = document.getElementById('feed');
    const countEl = document.getElementById('result-count');
    const searchEl = document.getElementById('search');
    const filtersEl = document.getElementById('filters');
    const languageFiltersEl = document.getElementById('language-filters');
    const viewModeFiltersEl = document.getElementById('view-mode-filters');
    const navBtns = Array.from(document.querySelectorAll('.nav-btn'));
    const sections = Array.from(document.querySelectorAll('main section'));
    const routineCards = Array.from(document.querySelectorAll('.routine-card'));
    const VIEW_MODE_KEY = 'good-inputs-view-mode-v1';

    const ROUTINES = {
      all: { label: '전체' },
      decision: { label: '판단 모드' },
      capital: { label: '자본 모드' },
      recovery: { label: '회복 모드' },
    };

    const DEV_SOURCES = new Set(['토스 테크', '네이버 D2', 'GitHub Engineering', 'Node.js Blog', 'Django Blog', 'Python Insider', 'pnpm Blog', 'React Blog', 'Go Blog', 'Rust Blog', 'Kubernetes Blog', 'AWS Developer', 'Meta Engineering', 'Dropbox Tech', 'Slack Engineering', 'Svelte Blog', 'Tailscale Blog']);
    const KOREAN_ECON_SOURCES = new Set(['자본시장연구원', 'KIEP', '한국은행']);
    const ECON_SOURCES = new Set([...KOREAN_ECON_SOURCES, 'St. Louis Fed', 'NY Fed Liberty Street', 'FRED Blog', 'NBER Working Papers', 'ECB Blog', 'ECB Press', 'Dallas Fed', 'Stripe Blog']);
    const DECISION_SOURCES = new Set(['국토정책Brief', '국토이슈리포트', '워킹페이퍼', 'KDI FOCUS', 'KDI 연구보고서', ...DEV_SOURCES, ...ECON_SOURCES]);
    const RECOVERY_SOURCES = new Set(['MMCA', '국립중앙박물관', 'EBS']);
    const CAPITAL_KEYWORDS = [
      '스케일업', '성장', '기업', '산업', '재정', '경제', '투자', '인구', '도시', '주택', '인프라', '에너지', '건설', '민간투자', '생활인구', '북한', '고령화', '금리', 'inflation', 'interest rate', 'labor', 'employment', 'productivity', 'recession', 'market', 'trade', 'ai', 'agent', '배포', 'infra', 'infrastructure', 'performance', 'security'
    ];

    let currentFilter = 'all';
    let currentLanguageFilter = 'all';
    let currentRoutine = 'all';
    let currentViewMode = loadViewMode();
    let items = [];

    function loadViewMode() {
      try {
        const saved = localStorage.getItem(VIEW_MODE_KEY);
        return saved === 'compact' ? 'compact' : 'default';
      } catch {
        return 'default';
      }
    }

    function saveViewMode() {
      try {
        localStorage.setItem(VIEW_MODE_KEY, currentViewMode);
      } catch {}
    }

    function escapeHtml(value = '') {
      return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function scoreLabel(score = '') {
      return ({ new: '신규', fresh: '최근', stable: '축적' }[score] || '기본');
    }

    function itemMatchesRoutine(item, routine) {
      const source = String(item.source || '');
      const haystack = [item.title, item.summary, item.tags?.join(' '), item.category].join(' ').toLowerCase();

      if (routine === 'all') return true;
      if (routine === 'decision') return DECISION_SOURCES.has(source);
      if (routine === 'recovery') return RECOVERY_SOURCES.has(source);
      if (routine === 'capital') {
        if (!DECISION_SOURCES.has(source)) return false;
        return CAPITAL_KEYWORDS.some(keyword => haystack.includes(keyword.toLowerCase()));
      }
      return true;
    }

    function getRoutineItems() {
      return items.filter(item => itemMatchesRoutine(item, currentRoutine));
    }

    function getFilterOptions() {
      if (currentRoutine === 'recovery') {
        return [
          { key: 'all', label: '전체' },
          { key: 'recent', label: '최근' },
        ];
      }

      return [
        { key: 'all', label: '전체' },
        { key: 'important', label: '중요' },
        { key: 'recent', label: '최근' },
        { key: 'korean-economy', label: '국내경제' },
        { key: 'development', label: '개발' },
      ];
    }

    function filterMatches(item) {
      const source = String(item.source || '');
      const category = String(item.category || '');
      const combined = [item.title, item.summary, ...(item.tags || [])].join(' ').toLowerCase();

      if (currentFilter === 'all') return true;
      if (currentFilter === 'recent') return item.score === 'new' || item.score === 'fresh';
      if (currentFilter === 'development') return DEV_SOURCES.has(source) || category === '개발';
      if (currentFilter === 'korean-economy') {
        return KOREAN_ECON_SOURCES.has(source);
      }
      if (currentFilter === 'important') {
        return item.score === 'new'
          || item.score === 'fresh'
          || ECON_SOURCES.has(source)
          || DEV_SOURCES.has(source)
          || /금리|재정|경제|투자|기업|산업|ai|agent|security|performance/.test(combined);
      }
      return true;
    }

    function itemLanguage(item) {
      const text = [item.title, item.summary, item.source, item.authors].join(' ');
      return /[가-힣]/.test(text) ? 'ko' : 'en';
    }

    function languageMatches(item) {
      if (currentLanguageFilter === 'all') return true;
      return itemLanguage(item) === currentLanguageFilter;
    }

    function usageText(item) {
      const source = String(item.source || '');
      const title = String(item.title || '');
      const category = String(item.category || '');
      const combined = `${title} ${item.summary || ''} ${(item.tags || []).join(' ')}`;

      if (RECOVERY_SOURCES.has(source)) return '감각 회복용';
      if (DEV_SOURCES.has(source)) return '개발 감각 유지용';
      if (ECON_SOURCES.has(source)) return '매크로 판단용';
      if (/스케일업|기업|재정|경제|투자|산업/.test(combined)) return '현금흐름 판단용';
      if (/인구|도시|주택|인프라|개발|생활인구/.test(combined)) return '구조 변화 판단용';
      if (category === '연구') return '장기 구조 분석용';
      if (category === '이슈') return '변화 감지용';
      return '판단 보조용';
    }

    function renderFilters() {
      const options = getFilterOptions();
      if (!options.some(option => option.key === currentFilter)) currentFilter = 'all';

      filtersEl.innerHTML = options.map(option => `
        <button class="chip ${option.key === currentFilter ? 'active' : ''}" data-filter="${escapeHtml(option.key)}">${escapeHtml(option.label)}</button>
      `).join('');

      Array.from(filtersEl.querySelectorAll('.chip')).forEach(chip => {
        chip.addEventListener('click', () => {
          currentFilter = chip.dataset.filter || 'all';
          renderFilters();
          renderFeed();
        });
      });
    }

    function renderLanguageFilters() {
      const options = [
        { key: 'all', label: '전체 언어' },
        { key: 'ko', label: '한글' },
        { key: 'en', label: '영어' },
      ];

      languageFiltersEl.innerHTML = options.map(option => `
        <button class="subchip ${option.key === currentLanguageFilter ? 'active' : ''}" data-language="${escapeHtml(option.key)}">${escapeHtml(option.label)}</button>
      `).join('');

      Array.from(languageFiltersEl.querySelectorAll('.subchip')).forEach(chip => {
        chip.addEventListener('click', () => {
          currentLanguageFilter = chip.dataset.language || 'all';
          renderLanguageFilters();
          renderFeed();
        });
      });
    }

    function applyViewMode() {
      document.body.classList.toggle('compact-mode', currentViewMode === 'compact');
    }

    function renderViewModeFilters() {
      const options = [
        { key: 'default', label: '기본' },
        { key: 'compact', label: '초미니' },
      ];

      viewModeFiltersEl.innerHTML = options.map(option => `
        <button class="subchip ${option.key === currentViewMode ? 'active' : ''}" data-view-mode="${escapeHtml(option.key)}">${escapeHtml(option.label)}</button>
      `).join('');

      Array.from(viewModeFiltersEl.querySelectorAll('.subchip')).forEach(chip => {
        chip.addEventListener('click', () => {
          currentViewMode = chip.dataset.viewMode || 'default';
          saveViewMode();
          applyViewMode();
          renderViewModeFilters();
        });
      });
    }

    function renderFeed() {
      const q = searchEl.value.trim().toLowerCase();
      const filtered = getRoutineItems().filter(item => {
        const haystack = [
          item.source,
          item.title,
          item.summary,
          item.date,
        ].join(' ').toLowerCase();
        return filterMatches(item) && languageMatches(item) && (!q || haystack.includes(q));
      });

      countEl.textContent = currentRoutine === 'all'
        ? `${filtered.length}개`
        : `${filtered.length}개 · ${ROUTINES[currentRoutine].label}`;
      feedEl.innerHTML = '';

      if (!filtered.length) {
        feedEl.innerHTML = `
          <article class="card">
            <h3 class="title">결과 없음</h3>
            <p class="why">검색어나 루틴을 넓혀라.</p>
          </article>
        `;
        return;
      }

      filtered.forEach(item => {
        const card = document.createElement('article');
        card.className = 'card';
        card.innerHTML = `
          <div class="meta-top">
            <div class="source">
              <span class="dot"></span>
              <div>
                <div class="category">${escapeHtml(item.source || item.category || '원문')}</div>
                <h3 class="title">${escapeHtml(item.title || '')}</h3>
              </div>
            </div>
            <div class="score">${escapeHtml(scoreLabel(item.score))}</div>
          </div>
          <p class="meta-line">${escapeHtml(item.date || '-')} · ${escapeHtml(usageText(item))}${item.authors ? ` · ${escapeHtml(item.authors)}` : ''}</p>
          <p class="why">${escapeHtml(item.summary || '요약 없음')}</p>
          <div class="actions">
            <a class="btn" href="${escapeHtml(item.url || '#')}" target="_blank" rel="noopener noreferrer">원문 열기</a>
          </div>
        `;
        feedEl.appendChild(card);
      });
    }

    async function loadFeed() {
      feedEl.innerHTML = `
        <article class="card">
          <h3 class="title">불러오는 중</h3>
          <p class="why">허용한 원문만 가져온다.</p>
        </article>
      `;

      try {
        const res = await fetch(`data/feed.json?t=${Date.now()}`);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        items = Array.isArray(data.items) ? data.items : [];
      } catch (error) {
        items = [];
        feedEl.innerHTML = `
          <article class="card">
            <h3 class="title">피드 로드 실패</h3>
            <p class="why">정적 사이트는 열렸지만 원문 피드 JSON을 아직 못 읽었다. 잠시 뒤 다시 열어라.</p>
          </article>
        `;
        countEl.textContent = '0개';
        renderFilters();
        renderLanguageFilters();
        renderViewModeFilters();
        return;
      }

      applyViewMode();
      renderFilters();
      renderLanguageFilters();
      renderViewModeFilters();
      renderFeed();
    }

    function activateSection(targetId) {
      navBtns.forEach(btn => btn.classList.toggle('active', btn.dataset.target === targetId));
      sections.forEach(section => section.classList.toggle('hidden', section.id !== targetId));
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function setRoutineFilter(routine) {
      currentRoutine = ROUTINES[routine] ? routine : 'all';
      currentFilter = 'all';
      currentLanguageFilter = 'all';
      renderFilters();
      renderLanguageFilters();
      renderFeed();
      activateSection('home-section');
    }

    searchEl.addEventListener('input', renderFeed);

    navBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        if (btn.dataset.target === 'home-section') {
          currentRoutine = 'all';
          currentFilter = 'all';
          currentLanguageFilter = 'all';
          renderFilters();
          renderLanguageFilters();
          renderFeed();
        }
        activateSection(btn.dataset.target);
      });
    });

    routineCards.forEach(card => {
      card.addEventListener('click', () => {
        setRoutineFilter(card.dataset.routine || 'all');
      });
    });

    loadFeed();
  </script>
</body>
</html>
