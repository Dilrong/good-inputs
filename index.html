<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>좋은입력</title>
  <meta name="theme-color" content="#0b0f1a" />
  <style>
    :root {
      --bg: #0b0f1a;
      --panel: #121827;
      --panel-2: #0f1522;
      --line: #222c42;
      --text: #eef2ff;
      --muted: #9aa5c3;
      --blue: #7aa2ff;
      --green: #7ee0ae;
      --orange: #ffb86b;
      --shadow: 0 10px 30px rgba(0, 0, 0, .28);
      --radius: 18px;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    body { line-height: 1.5; }
    a { color: inherit; text-decoration: none; }

    .app {
      width: 100%;
      max-width: 720px;
      margin: 0 auto;
      padding-bottom: 88px;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 30;
      padding: 14px 14px 10px;
      background: linear-gradient(180deg, rgba(11,15,26,.96), rgba(11,15,26,.92));
      backdrop-filter: blur(14px);
      border-bottom: 1px solid rgba(255,255,255,.04);
    }

    .brand {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .brand h1 {
      margin: 0;
      font-size: 24px;
      line-height: 1.1;
      letter-spacing: -.02em;
    }

    .brand p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .badge {
      flex: 0 0 auto;
      border: 1px solid rgba(126,224,174,.35);
      color: var(--green);
      background: rgba(126,224,174,.10);
      padding: 7px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
    }

    .search {
      width: 100%;
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--text);
      border-radius: 14px;
      padding: 14px 14px;
      font-size: 15px;
      outline: none;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.02);
    }

    .chips {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-top: 10px;
      scrollbar-width: none;
    }
    .chips::-webkit-scrollbar { display: none; }

    .chip {
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--text);
      border-radius: 999px;
      padding: 10px 13px;
      white-space: nowrap;
      font-size: 13px;
      cursor: pointer;
    }
    .chip.active {
      background: rgba(122,162,255,.16);
      border-color: rgba(122,162,255,.45);
      color: #dfe8ff;
    }

    .content {
      padding: 14px;
    }

    .hero-card, .card, .mini-card {
      background: linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.01));
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .hero-card {
      padding: 16px;
      margin-bottom: 14px;
      background:
        radial-gradient(circle at top right, rgba(122,162,255,.22), transparent 34%),
        linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.01));
    }

    .hero-title {
      font-size: 18px;
      font-weight: 800;
      margin: 0 0 8px;
    }

    .hero-text {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
    }

    .quick-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 12px;
    }

    .mini-card {
      padding: 12px;
    }

    .mini-card strong {
      display: block;
      font-size: 13px;
      margin-bottom: 6px;
    }

    .mini-card span {
      color: var(--muted);
      font-size: 12px;
    }

    .section-label {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 18px 2px 10px;
    }

    .section-label h2 {
      margin: 0;
      font-size: 15px;
    }

    .section-label span {
      color: var(--muted);
      font-size: 12px;
    }

    .feed {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .card {
      padding: 14px;
    }

    .meta-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
    }

    .source {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--blue);
      flex: 0 0 auto;
      box-shadow: 0 0 0 4px rgba(122,162,255,.12);
    }

    .category {
      font-size: 12px;
      color: var(--green);
      font-weight: 700;
      margin-bottom: 2px;
    }

    .title {
      margin: 0;
      font-size: 18px;
      line-height: 1.25;
      word-break: keep-all;
    }

    .score {
      flex: 0 0 auto;
      border: 1px solid rgba(255,184,107,.35);
      background: rgba(255,184,107,.08);
      color: var(--orange);
      border-radius: 999px;
      padding: 7px 10px;
      font-size: 12px;
      font-weight: 700;
    }

    .desc {
      color: #d8def2;
      font-size: 14px;
      margin: 0 0 8px;
    }

    .why {
      color: var(--muted);
      font-size: 13px;
      margin: 0;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      margin-top: 12px;
    }

    .tag {
      border: 1px solid var(--line);
      background: var(--panel-2);
      color: var(--muted);
      border-radius: 999px;
      padding: 6px 9px;
      font-size: 12px;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      margin-top: 14px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 46px;
      padding: 0 14px;
      border-radius: 14px;
      border: 1px solid rgba(122,162,255,.45);
      background: rgba(122,162,255,.14);
      color: var(--text);
      font-weight: 700;
      font-size: 14px;
    }

    .btn.secondary {
      border-color: var(--line);
      background: var(--panel-2);
      color: var(--muted);
      min-width: 88px;
    }

    .state-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .state-btn {
      border: 1px solid var(--line);
      background: var(--panel-2);
      color: var(--muted);
      border-radius: 999px;
      padding: 8px 11px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
    }

    .state-btn.active {
      border-color: rgba(122,162,255,.45);
      background: rgba(122,162,255,.14);
      color: var(--text);
    }

    .note-status {
      color: var(--muted);
      font-size: 12px;
    }

    .memo-box {
      width: 100%;
      min-height: 88px;
      margin-top: 10px;
      padding: 12px 13px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--panel-2);
      color: var(--text);
      resize: vertical;
      font: inherit;
    }

    .memo-box::placeholder {
      color: var(--muted);
    }

    .helper {
      margin-top: 18px;
      padding: 14px;
      color: var(--muted);
      font-size: 13px;
      text-align: center;
    }

    .footer-nav {
      position: fixed;
      left: 50%;
      bottom: 10px;
      transform: translateX(-50%);
      width: min(92vw, 560px);
      border: 1px solid var(--line);
      background: rgba(15,21,34,.92);
      backdrop-filter: blur(12px);
      border-radius: 18px;
      padding: 8px;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      box-shadow: var(--shadow);
    }

    .routine-card {
      width: 100%;
      border: 1px solid var(--line);
      color: var(--text);
      text-align: left;
      cursor: pointer;
    }

    .routine-card:hover,
    .routine-card:focus-visible {
      border-color: rgba(122,162,255,.45);
      background: rgba(122,162,255,.08);
      outline: none;
    }

    .routine-go {
      display: inline-flex;
      margin-top: 12px;
      color: var(--blue);
      font-size: 13px;
      font-weight: 700;
    }

    .nav-btn {
      border: 0;
      background: transparent;
      color: var(--muted);
      border-radius: 12px;
      padding: 10px 8px;
      font-size: 12px;
      cursor: pointer;
    }

    .nav-btn.active {
      background: rgba(122,162,255,.14);
      color: var(--text);
    }

    .hidden { display: none !important; }

    @media (min-width: 721px) {
      .content { padding: 18px; }
      .topbar { padding: 18px 18px 12px; }
      .quick-grid { grid-template-columns: repeat(4, 1fr); }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <div>
          <h1>좋은입력</h1>
          <p>허용한 원문만 모아 보는 피드</p>
        </div>
        <div class="badge">화이트리스트</div>
      </div>
      <input id="search" class="search" type="text" placeholder="제목, 주체, 출처, 메모 검색" />
      <div class="chips" id="filters"></div>
    </header>

    <main class="content">
      <section id="home-section">
        <div class="hero-card">
          <p class="hero-title">화이트리스트 원문 피드</p>
          <p class="hero-text">소스별 원문만 시간순으로 본다. 읽음, 즐겨찾기, 메모는 이 브라우저에만 저장된다.</p>
          <div class="quick-grid">
            <div class="mini-card"><strong>현재 소스</strong><span>KRIHS · KDI · MMCA · 박물관 · EBS</span></div>
            <div class="mini-card"><strong>루틴</strong><span>투자 · 공부 · 휴식</span></div>
            <div class="mini-card"><strong>상태 관리</strong><span>읽음 체크 · 즐겨찾기</span></div>
            <div class="mini-card"><strong>개인 기록</strong><span>카드별 메모 저장</span></div>
          </div>
        </div>

        <div class="section-label">
          <h2>클린 피드</h2>
          <span id="result-count">0개</span>
        </div>
        <div class="feed" id="feed"></div>
      </section>

      <section id="routine-section" class="hidden">
        <div class="hero-card">
          <p class="hero-title">30분 대체 루틴</p>
          <p class="hero-text">루틴을 누르면 그 목적에 맞는 피드만 바로 보여준다.</p>
        </div>
        <div class="feed">
          <button class="card routine-card" type="button" data-routine="invest">
            <div class="category">루틴 1</div>
            <h3 class="title">투자 모드</h3>
            <p class="desc">KRIHS, KDI 중심의 정책, 이슈, 연구 자료만 본다.</p>
            <p class="why">판단과 의사결정에 바로 쓰는 입력만 남긴다.</p>
            <span class="routine-go">해당 피드 보기</span>
          </button>
          <button class="card routine-card" type="button" data-routine="study">
            <div class="category">루틴 2</div>
            <h3 class="title">공부 모드</h3>
            <p class="desc">연구 보고서, 정책 자료, EBS 다큐형 학습 콘텐츠를 본다.</p>
            <p class="why">축적 가능한 입력만 남긴다.</p>
            <span class="routine-go">해당 피드 보기</span>
          </button>
          <button class="card routine-card" type="button" data-routine="rest">
            <div class="category">루틴 3</div>
            <h3 class="title">휴식 모드</h3>
            <p class="desc">MMCA, 박물관, EBS만 남겨서 가볍게 본다.</p>
            <p class="why">자극보다 밀도가 높은 휴식 입력만 남긴다.</p>
            <span class="routine-go">해당 피드 보기</span>
          </button>
        </div>
      </section>

      <div class="helper">읽음, 즐겨찾기, 메모는 현재 브라우저에만 저장된다.</div>
    </main>
  </div>

  <nav class="footer-nav">
    <button class="nav-btn active" data-target="home-section">피드</button>
    <button class="nav-btn" data-target="routine-section">루틴</button>
  </nav>

  <script>
    const feedEl = document.getElementById('feed');
    const countEl = document.getElementById('result-count');
    const searchEl = document.getElementById('search');
    const filtersEl = document.getElementById('filters');
    const navBtns = Array.from(document.querySelectorAll('.nav-btn'));
    const sections = Array.from(document.querySelectorAll('main section'));
    const routineCards = Array.from(document.querySelectorAll('.routine-card'));

    const STORAGE_KEY = 'good-inputs-user-state-v1';
    const ROUTINES = {
      all: { label: '전체' },
      invest: { label: '투자 모드' },
      study: { label: '공부 모드' },
      rest: { label: '휴식 모드' },
    };

    const SOURCE_GROUPS = {
      invest: new Set(['국토정책Brief', '국토이슈리포트', '워킹페이퍼', 'KDI FOCUS', 'KDI 연구보고서']),
      study: new Set(['국토정책Brief', '국토이슈리포트', '워킹페이퍼', 'KDI FOCUS', 'KDI 연구보고서', 'EBS']),
      rest: new Set(['MMCA', '국립중앙박물관', 'EBS']),
    };

    let currentFilter = 'all';
    let currentRoutine = 'all';
    let items = [];
    let userState = loadUserState();

    function defaultUserState() {
      return { read: {}, favorite: {}, memo: {} };
    }

    function loadUserState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return defaultUserState();
        const parsed = JSON.parse(raw);
        return {
          read: parsed?.read || {},
          favorite: parsed?.favorite || {},
          memo: parsed?.memo || {},
        };
      } catch {
        return defaultUserState();
      }
    }

    function saveUserState() {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(userState));
      } catch {}
    }

    function itemKey(item) {
      return String(item.url || `${item.source}|${item.title}|${item.date}`);
    }

    function escapeHtml(value = '') {
      return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function scoreLabel(score = '') {
      return ({ new: 'new', fresh: 'fresh', stable: 'archive' }[score] || score || 'feed');
    }

    function noteStatusText(key) {
      if (userState.favorite[key]) return '즐겨찾기 저장됨';
      if (userState.read[key]) return '읽음 처리됨';
      return '이 브라우저에 저장';
    }

    function itemMatchesRoutine(item, routine) {
      if (routine === 'all') return true;
      return SOURCE_GROUPS[routine]?.has(String(item.source || '')) || false;
    }

    function getRoutineItems() {
      return items.filter(item => itemMatchesRoutine(item, currentRoutine));
    }

    function getMemo(item) {
      return userState.memo[itemKey(item)] || '';
    }

    function renderFilters() {
      const routineItems = getRoutineItems();
      const categories = ['all', ...new Set(routineItems.map(item => item.category).filter(Boolean))];
      if (!categories.includes(currentFilter)) currentFilter = 'all';

      filtersEl.innerHTML = categories.map(category => `
        <button class="chip ${category === currentFilter ? 'active' : ''}" data-filter="${escapeHtml(category)}">${category === 'all' ? '전체' : escapeHtml(category)}</button>
      `).join('');

      Array.from(filtersEl.querySelectorAll('.chip')).forEach(chip => {
        chip.addEventListener('click', () => {
          currentFilter = chip.dataset.filter;
          renderFilters();
          renderFeed();
        });
      });
    }

    function attachCardStateEvents(card, item, key) {
      const readBtn = card.querySelector('[data-action="toggle-read"]');
      const favoriteBtn = card.querySelector('[data-action="toggle-favorite"]');
      const memoBox = card.querySelector('[data-action="memo"]');
      const noteStatus = card.querySelector('[data-role="note-status"]');

      const sync = () => {
        readBtn.classList.toggle('active', Boolean(userState.read[key]));
        favoriteBtn.classList.toggle('active', Boolean(userState.favorite[key]));
        noteStatus.textContent = noteStatusText(key);
      };

      readBtn.addEventListener('click', () => {
        userState.read[key] = !userState.read[key];
        if (!userState.read[key]) delete userState.read[key];
        saveUserState();
        sync();
      });

      favoriteBtn.addEventListener('click', () => {
        userState.favorite[key] = !userState.favorite[key];
        if (!userState.favorite[key]) delete userState.favorite[key];
        saveUserState();
        sync();
      });

      memoBox.addEventListener('input', () => {
        const value = memoBox.value.trim();
        if (value) userState.memo[key] = value;
        else delete userState.memo[key];
        saveUserState();
        noteStatus.textContent = value ? '메모 저장됨' : noteStatusText(key);
      });

      sync();
    }

    function renderFeed() {
      const q = searchEl.value.trim().toLowerCase();
      const filtered = getRoutineItems().filter(item => {
        const byCategory = currentFilter === 'all' || item.category === currentFilter;
        const haystack = [
          item.category,
          item.source,
          item.title,
          item.authors,
          item.summary,
          item.date,
          getMemo(item),
          ...(item.tags || []),
        ].join(' ').toLowerCase();
        return byCategory && (!q || haystack.includes(q));
      });

      countEl.textContent = currentRoutine === 'all'
        ? `${filtered.length}개`
        : `${filtered.length}개 · ${ROUTINES[currentRoutine].label}`;
      feedEl.innerHTML = '';

      if (!filtered.length) {
        feedEl.innerHTML = `
          <article class="card">
            <h3 class="title">결과 없음</h3>
            <p class="why">검색어나 필터를 넓혀라.</p>
          </article>
        `;
        return;
      }

      filtered.forEach(item => {
        const key = itemKey(item);
        const memo = getMemo(item);
        const card = document.createElement('article');
        card.className = 'card';
        card.innerHTML = `
          <div class="meta-top">
            <div class="source">
              <span class="dot"></span>
              <div>
                <div class="category">${escapeHtml(item.source || item.category || '원문')}</div>
                <h3 class="title">${escapeHtml(item.title || '')}</h3>
              </div>
            </div>
            <div class="score">${escapeHtml(scoreLabel(item.score))}</div>
          </div>
          <p class="desc"><strong>날짜.</strong> ${escapeHtml(item.date || '-')} · <strong>주체.</strong> ${escapeHtml(item.authors || '-')}</p>
          <p class="why"><strong>핵심.</strong> ${escapeHtml(item.summary || '요약 없음')}</p>
          <div class="tags">${(item.tags || []).map(tag => `<span class="tag">${escapeHtml(tag)}</span>`).join('')}</div>
          <div class="state-row">
            <button class="state-btn" type="button" data-action="toggle-read">읽음</button>
            <button class="state-btn" type="button" data-action="toggle-favorite">즐겨찾기</button>
            <span class="note-status" data-role="note-status">${escapeHtml(noteStatusText(key))}</span>
          </div>
          <textarea class="memo-box" data-action="memo" placeholder="개인 메모를 남겨라. 이 브라우저에만 저장된다.">${escapeHtml(memo)}</textarea>
          <div class="actions">
            <a class="btn" href="${escapeHtml(item.url || '#')}" target="_blank" rel="noopener noreferrer">원문 열기</a>
            <a class="btn secondary" href="${escapeHtml(item.url || '#')}" target="_blank" rel="noopener noreferrer">링크</a>
          </div>
        `;
        feedEl.appendChild(card);
        attachCardStateEvents(card, item, key);
      });
    }

    async function loadFeed() {
      feedEl.innerHTML = `
        <article class="card">
          <h3 class="title">불러오는 중</h3>
          <p class="why">허용한 원문 소스만 가져온다.</p>
        </article>
      `;

      try {
        const res = await fetch(`data/feed.json?t=${Date.now()}`);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        items = Array.isArray(data.items) ? data.items : [];
      } catch (error) {
        items = [];
        feedEl.innerHTML = `
          <article class="card">
            <h3 class="title">피드 로드 실패</h3>
            <p class="why">정적 사이트는 열렸지만 원문 피드 JSON을 아직 못 읽었다. 잠시 뒤 다시 열어라.</p>
          </article>
        `;
        countEl.textContent = '0개';
        renderFilters();
        return;
      }

      renderFilters();
      renderFeed();
    }

    function activateSection(targetId) {
      navBtns.forEach(btn => btn.classList.toggle('active', btn.dataset.target === targetId));
      sections.forEach(section => section.classList.toggle('hidden', section.id !== targetId));
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function setRoutineFilter(routine) {
      currentRoutine = ROUTINES[routine] ? routine : 'all';
      currentFilter = 'all';
      renderFilters();
      renderFeed();
      activateSection('home-section');
    }

    searchEl.addEventListener('input', renderFeed);

    navBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        if (btn.dataset.target === 'home-section') {
          currentRoutine = 'all';
          currentFilter = 'all';
          renderFilters();
          renderFeed();
        }
        activateSection(btn.dataset.target);
      });
    });

    routineCards.forEach(card => {
      card.addEventListener('click', () => {
        setRoutineFilter(card.dataset.routine || 'all');
      });
    });

    loadFeed();
  </script>
</body>
</html>
